[server]
; Your Railway app URL (no trailing slash)
url = https://masterji-app-production.up.railway.app
; The PRINT_AGENT_TOKEN you set in Railway environment variables
agent_token = CHANGE_THIS_TO_YOUR_TOKEN

[printer]
; Exact printer name as shown in Windows Devices and Printers
; To check: Control Panel > Devices and Printers > look at the printer name
name = RP 3220 Star
; Print mode: 'raw' (ESC/POS) or 'html' (via Windows printer driver)
mode = raw
; USB port: 'auto' (detect from printer), or exact port like USB001
; Direct USB bypasses the spooler entirely -- most reliable
port = auto

[agent]
; How often to check for new print jobs (in seconds)
poll_seconds = 5
